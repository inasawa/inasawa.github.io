<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>メシエ天体</title>
    <meta property="og:image" content="https://inasawa.github.io/messier/thumbnails/M42.webp">
    <link rel="stylesheet" href="messier.css">
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/stable/react@19",
          "react/jsx-runtime": "https://esm.sh/stable/react@19/jsx-runtime",
          "react-dom/client": "https://esm.sh/stable/react-dom@19/client",
          "react-router": "https://esm.sh/stable/react-router@7"
        }
      }
    </script>
    <script type="module" src="https://esm.sh/tsx"></script>
  </head>
  <body>
    <h1>メシエ天体</h1>
    <div id="root"></div>
    <script type="text/babel">
      import { useState, useEffect } from "react";
      import { createRoot } from "react-dom/client";
      import { BrowserRouter, Routes, Route, Link, useLocation, useParams } from "react-router";
      createRoot(document.getElementById("root")).render(<App/>);

      function App() {
        const [ messier, setMessier ] = useState();
        useEffect(() => {
          //console.log('App useEffect');
          fetch('/messier/messier.json', {method: 'GET'})
          .then(res => res.json())
          .then(data => {
            //console.log('App useEffect data', data);
            setMessier(data)
          })
        }, []);
        if (!messier) {
          //console.log('App waiting messier.json');
          return;
        }
        return (
          <BrowserRouter>
            <Routes>
              <Route path="/messier/index-react.html" element={<TopPage list={messier.list} image_count={messier.image_count} messier_count={messier.count} />} />
              <Route path="/messier/images/:image" element={<Image list={messier.list} />} />
            </Routes>
          </BrowserRouter>
        );
      }

      function TopPage(props) {
        let location = useLocation();
        //console.log('App props', props);
        //console.log('App location', location);
        const links = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                return (<span><a href={'#M'+m.M}>M{m.M}</a></span>);
              }
              else {
                return (<span><a href={'#M'+m.N}>M{m.M}</a></span>);
              }
            }
            else {
              return (<span>M{m.M}</span>);
            }
          });
        //console.log(links);
        const images = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                return (<div id={'M'+m.M}><Link to={'/messier/images/M'+m.M} state={{config: m}} ><img src={'thumbnails/M'+m.M+'.webp'} title={'M'+m.M} alt={'M'+m.M}/></Link><div class="caption">{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}<br/><span dangerouslySetInnerHTML={{__html: m.C1.join('<br/>')}} /><br/>{m.C2}</div></div>);
              }
            }
          });
        //console.log(images);
        return (
          <>
            <header>メシエ天体を DWARF mini で撮影<br/>東京都内の明るい空で挑戦中<br/>現在 {props.image_count}画像、{props.count}天体</header>
            <div class="link-list">
              {links}
            </div>
            <div class="image-list">
              {images}
            </div>
            <div class="link-list">
              {links}
            </div>
            <footer>
              <div>※ サムネイルの画像は DWARF mini で撮影した画像を縮小し、横幅だけ詰めたもの</div>
              <div>※ 各画像をクリックすると、元画像が参照できます</div>
              <div>※ 元画像は DWARF mini の天文スタジオで自動補正しただけ</div>
              <div>※ １行目の表示は、撮影日時、シャッター速度、ゲイン、露出時間(シャッター速度xスタック数)、フィルター</div>
            </footer>
          </>
        );
      }

      function Image(props) {
        const location = useLocation();
        const { image } = useParams();
        const m = location.state.config;
        console.log('Image props', props);
        console.log('Image location', location);
        console.log('Image image', image);
        //<div class="caption">{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}<br/><span dangerouslySetInnerHTML={{__html: m.C1.join('<br/>')}} /><br/>{m.C2}</div>
        return (
          <div class="image">
            <img src={'/messier/images/'+m.I} title={'M'+m.M} alt={'M'+m.M} />
            <div class="caption">{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}<br/><span dangerouslySetInnerHTML={{__html: m.C1.join('<br/>')}} /><br/>{m.C2}</div>
          </div>
        );
      }
    </script>
  </body>
</html>
