<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>メシエ天体</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://inasawa.github.io/messier/thumbnails/M42.webp">
    <link rel="stylesheet" href="messier.css">
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/stable/react@19",
          "react/jsx-runtime": "https://esm.sh/stable/react@19/jsx-runtime",
          "react-dom/client": "https://esm.sh/stable/react-dom@19/client",
          "react-router": "https://esm.sh/stable/react-router@7"
        }
      }
    </script>
    <script type="module" src="https://esm.sh/tsx"></script>
  </head>
  <body>
    <h1>メシエ天体</h1>
    <div id="root"></div>
    <script type="text/babel">
      import { useState, useEffect } from "react";
      import { createRoot } from "react-dom/client";
      import { BrowserRouter, Routes, Route, Link, useParams, useNavigate, useLocation } from "react-router";
      createRoot(document.getElementById("root")).render(<App/>);

      function App() {
        const [ messier, setMessier ] = useState();
        useEffect(() => {
          //console.log('App useEffect');
          fetch('/messier/messier.json', {method: 'GET'})
          .then(res => res.json())
          .then(data => {
            //console.log('App useEffect data', data);
            setMessier(data)
          })
        }, []);
        if (!messier) {
          //console.log('App waiting messier.json');
          return;
        }
        return (
          <BrowserRouter>
            <Routes>
              <Route path="/messier/" element={<TopPage list={messier.list} image_count={messier.image_count} count={messier.count} />} />
              <Route path="/messier/images/:id" element={<Image list={messier.list} />} />
            </Routes>
          </BrowserRouter>
        );
      }

      function TopPage(props) {
        const location = useLocation();
        //console.log('App props', props);
        //console.log('App location', location);
        const links = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                return (<span><a href={'#M'+m.M}>M{m.M}</a></span>);
              }
              else {
                return (<span><a href={'#M'+m.N}>M{m.M}</a></span>);
              }
            }
            else {
              return (<span>M{m.M}</span>);
            }
          });
        const match = location.hash.match(/^#M(\d+)$/);
        //console.log('TopPage location', location.pathname, location.hash, match);
        const thumbnails = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                return (<div id={'M'+m.M} className={match && m.M == match[1] ? "selected" : null} ><Link to={'/messier/images/M'+m.M} ><img src={'thumbnails/M'+m.M+'.webp'} title={'M'+m.M} alt={'M'+m.M}/></Link><div className="caption">{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}<br/><span dangerouslySetInnerHTML={{__html: m.C1.join('<br/>')}} /><br/>{m.C2}</div></div>);
              }
            }
          });
        //console.log(images);
        return (
          <>
            <header>メシエ天体を DWARF mini で撮影<br/>東京都内の明るい空（ボートル・スケール 9）で挑戦中<br/>現在 {props.image_count} 画像、{props.count} 天体</header>
            <div className="link-list">
              {links}
            </div>
            <div className="image-list">
              {thumbnails}
            </div>
            <div className="link-list">
              {links}
            </div>
            <footer>
              <div>※ サムネイルの画像は DWARF mini で撮影した画像を縮小し、横幅だけ詰めたもの</div>
              <div>※ 各画像をクリックすると、元画像が参照できます</div>
              <div>※ 元画像は DWARF mini の天文スタジオで自動補正しただけ</div>
              <div>※ １行目の表示は、撮影日時、シャッター速度、ゲイン、露出時間(シャッター速度xスタック数)、フィルター</div>
            </footer>
          </>
        );
      }

      function Image(props) {
        //const location = useLocation();
        const navigate = useNavigate();
        const { id } = useParams();
        const [annotation, setAnnotation ] = useState(false);
        //const m = location.state.config;
        const match = id.match(/^M(\d+)$/);
        //console.log('Image match', match);
        if (!match) {
          return;
        }
        const m = props.list[match[1]-1];
        //console.log('Image config', m);
        //console.log('Image props', props);
        //console.log('Image location', location);
        //console.log('Image image', image);

        function toggle_annotation() {
          setAnnotation(annotation => !annotation);
        }
        
        return (
          <div>
            <div style={{"display": "flex", "justify-content": "space-evenly", "align-items": "center"}} >
              <div style={{width: "30%"}}></div>
              <Link to={'/messier/'}><img src="/messier/thumbnails/btn-home.png" alt="Home" /></Link>
              <div style={{width: "30%"}}><button style={{padding: "5px 15px"}} onClick={toggle_annotation}>Annotation {annotation ? "Off" : "On"}</button></div>
            </div>
            <div style={{"display": "flex", "justify-content": "center"}} >
              <Link style={{"display": "flex", "align-items": "center"}} to={'/messier/images/M' + (m.prev + 1)} ><img src="/messier/thumbnails/btn-prev.png" alt="Prev" /></Link>
              <img style={{"max-width": "90%", "height": "auto", "margin": "10px 5px"}} src={'/messier/images/' + (annotation ? m.I.substring(0, m.I.length-7) + '0A.webp' : m.I)} title={'M'+m.M} alt={'M'+m.M} onClick={toggle_annotation} />
              <Link style={{"display": "flex", "align-items": "center"}} to={'/messier/images/M' + (m.next + 1)} ><img src="/messier/thumbnails/btn-next.png" alt="Next" /></Link>
            </div>
            <div style={{"text-align": "center"}}>{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}<br/><span dangerouslySetInnerHTML={{__html: m.C1.join('<br/>')}} /><br/>{m.C2}</div>
          </div>
        );
      }
    </script>
  </body>
</html>
