<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>メシエ天体</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:image" content="https://inasawa.github.io/messier/thumbnails/M42.webp">
    <link rel="stylesheet" href="messier.css">
    <!-- 2026-04-22
         https://esm.sh/stable/react@19.2.5(2026-03-18)
         https://esm.sh/stable/react@19.2.5/jsx-runtime
         https://esm.sh/stable/react-dom@19.2.5/client
         https://esm.sh/stable/react-router@7.14.1(2026-04-13) react-router@7.14.2(2026-04-21) => Uncaught TypeError: can't access property "useRef", i.H is null
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/stable/react@19",
          "react/jsx-runtime": "https://esm.sh/stable/react@19/jsx-runtime",
          "react-dom/client": "https://esm.sh/stable/react-dom@19/client",
          "react-router": "https://esm.sh/stable/react-router@7.14.1"
        } 
      }
    </script>
    <script type="module" src="https://esm.sh/tsx"></script>
  </head>
  <body>
    <h1 id="top">メシエ天体</h1>
    <div id="root"></div>
    <script type="text/babel">
      import { useState, useEffect, useRef } from "react";
      import { createRoot } from "react-dom/client";
      import { BrowserRouter, Routes, Route, Link, useParams, useNavigate, useLocation } from "react-router";
      createRoot(document.getElementById("root")).render(<App/>);

      function App() {
        const [ messier, setMessier ] = useState();
        useEffect(() => {
          //console.log('App useEffect');
          fetch('/messier/messier.json', {method: 'GET'})
          .then(res => res.json())
          .then(data => {
            //console.log('App useEffect data', data);
            setMessier(data)
          })
        }, []);
        if (!messier) {
          //console.log('App waiting messier.json');
          return;
        }
        return (
          <BrowserRouter>
            <Routes>
              <Route path="/messier/" element={<TopPage list={messier.list} image_count={messier.image_count} count={messier.count} />} />
              <Route path="/messier/images/:id" element={<Image list={messier.list} />} />
            </Routes>
          </BrowserRouter>
        );
      }

      function TopPage(props) {
        //console.log('TopPage props', props);
        const location = useLocation();
        const navigate = useNavigate();
        //console.log('TopPage location', location);
        const links = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                return (<span><Link to={'#M'+m.M}>M{m.M}</Link></span>);
              }
              else {
                return (<span><Link to={'#M'+m.N}>M{m.M}</Link></span>);
              }
            }
            else {
              return (<span>M{m.M}</span>);
            }
          });
        const match = location.hash.match(/^#M(\d+)$/);
        //console.log('TopPage location', location.pathname, location.hash, match);
        const thumbnails = 
          props.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                //console.log('thumbnails map', m);
                return (
                  <div id={'M'+m.M} className={"thumbnail-box " + (match && m.M == match[1] ? "selected" : "")} >
                    <Link to={'/messier/images/M'+m.M} >
                      <img className="thumbnail-img" src={'thumbnails/M'+m.M+'.webp'} title={'M'+m.M} alt={'M'+m.M} loading="lazy" />
                    </Link>
                    <div style={{"text-align": "center", "height": "100px"}} ><ImageCaption m={m} /></div>
                  </div>
                );
              }
            }
          });
        //console.log(images);
        
         useEffect(() => {
          //console.log('useEffect location.hash', location.hash);
          if (location.hash) {
            const element = document.querySelector(location.hash)
            if (element) {
              element.scrollIntoView({block: "nearest"} );
            }
          }
        }, [location.hash])

        useEffect(() => {
          const handleKeyDown = (event) => {
            //console.log('handleKeyDown document.baseURI', document.baseURI);
            const match = document.baseURI.match(/^.*\/#M(\d+)$/);
            //console.log('Key pressed:', '<' + event.key + '>', match ? match[1] : 'not match');
            switch (event.key) {
              case 'ArrowUp':
                document.getElementById('top').scrollIntoView();
                break;
              case 'ArrowDown':
                document.getElementById('bottom').scrollIntoView();
                break;
              case 'ArrowLeft':
                navigate('#M' + (match ? props.list[props.list[match[1]-1].prev].M : '1'))
                break;
              case 'ArrowRight':
                navigate('#M' + (match ? props.list[props.list[match[1]-1].next].M : '1'))
                break;
              case 'Enter':
                event.preventDefault();
                if (match) {
                  //console.log('handleKeyDown Enter', 'navigate /messier/images/M' + match[1]);
                  navigate('/messier/images/M' + match[1]);
                }
                break;
            }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => {
            window.removeEventListener('keydown', handleKeyDown);
          };
        }, []);

        return (
          <>
            <header>
              <div>メシエ天体を DWARF mini で撮影</div>
              <div>東京都内の明るい空（ボートル・スケール 9）で挑戦中</div>
              <div>現在 {props.image_count} 画像、{props.count} 天体</div>
            </header>
            <div className="link-list">
              {links}
            </div>
            <div className="thumbnail-list">
              {thumbnails}
            </div>
            <div className="link-list">
              {links}
            </div>
            <footer id="bottom" >
              <div>※ サムネイルの画像は DWARF mini で撮影した画像を縮小し、横幅だけ詰めたもの</div>
              <div>※ 各画像をクリックすると、元画像が参照できます</div>
              <div>※ 元画像は DWARF mini の天文スタジオで自動補正しただけ</div>
              <div>※ １行目の表示は、撮影日時、シャッター速度、ゲイン、露出時間(シャッター速度xスタック数)、フィルター</div>
              <div>※ 天体に関する情報は Wikipedia <a href="https://ja.wikipedia.org/wiki/%E3%83%A1%E3%82%B7%E3%82%A8%E5%A4%A9%E4%BD%93%E3%81%AE%E4%B8%80%E8%A6%A7">メシエ天体の一覧</a> より取得</div>
            </footer>
          </>
        );
      }

      function Image(props) {
        //console.log('Image props', props);
        const navigate = useNavigate();
        const { id } = useParams();
        const [annotation, setAnnotation ] = useState(false);
        const homeRef = useRef();
        const prevRef = useRef();
        const nextRef = useRef();
        const annoRef = useRef();
        const match = id.match(/^M(\d+)$/);
        //console.log('Image match', match);
        if (!match) {
          return;
        }
        const m = props.list[match[1]-1];
        //console.log('Image config', m);

        useEffect(() => {
          const handleKeyDown = (event) => {
            //console.log('Key pressed:', '<' + event.key + '>');
            switch (event.key) {
              case 'ArrowUp':
                homeRef.current.click();
                break;
              case 'ArrowLeft':
                prevRef.current.click();
                break;
              case 'ArrowRight':
                nextRef.current.click();
                break;
              case ' ':
                annoRef.current.click();
                break;
            }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => {
            window.removeEventListener('keydown', handleKeyDown);
          };
        }, []);

        function toggle_annotation() {
          setAnnotation(annotation => !annotation);
        }

        return (
          <div>
            <div style={{"display": "flex", "justify-content": "space-evenly", "align-items": "center"}} >
              <div style={{width: "30%"}}></div>
              <Link ref={homeRef} to={'/messier/#M' + m.M}><img src="/messier/thumbnails/btn-home.png" alt="Home" /></Link>
              <div style={{width: "30%"}}><button ref={annoRef} style={{padding: "5px 15px"}} onClick={toggle_annotation}>Annotation {annotation ? "Off" : "On"}</button></div>
            </div>
            <div style={{"display": "flex", "justify-content": "center"}} >
              <Link ref={prevRef} style={{"display": "flex", "align-items": "center"}} to={'/messier/images/M' + (m.prev + 1)} ><img src="/messier/thumbnails/btn-prev.png" alt="Prev" /></Link>
              <img style={{"max-width": "90%", "height": "auto", "margin": "10px 5px"}} src={'/messier/images/' + (annotation ? m.I.substring(0, m.I.length-6) + 'A.webp' : m.I)} title={'M'+m.M} alt={'M'+m.M} onClick={toggle_annotation} />
              <Link ref={nextRef} style={{"display": "flex", "align-items": "center"}} to={'/messier/images/M' + (m.next + 1)} ><img src="/messier/thumbnails/btn-next.png" alt="Next" /></Link>
            </div>
            <div style={{"text-align": "center"}} ><ImageCaption m={m} /></div>
          </div>
        );
      }

      function ImageCaption(props) {
        //console.log('ImageCaption props', props);
        const m = props.m;
        return (
          <>
            <div>{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}</div>
            {m.C1.map(function(c) {
              return (<div>{c}</div>);
            })}
            {m.C2 && <div>{m.C2}</div>}
          </>
        )
      }
    </script>
  </body>
</html>
