<!DOCTYPE html>
<html lang="ja" dir="ltr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <title>DWARF mini で天体撮影</title>
    <meta property="og:title" content="DWARF mini で天体撮影" />
    <meta property="og:image" content="https://inasawa.github.io/messier/thumbnails/M42.webp" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="/common.css" />
    <!-- 2026-04-22
         https://esm.sh/stable/react@19.2.5(2026-03-18) react@19.2.6(2026-06-06) => Uncaught TypeError: can't access property "useRef", i.H is null
         https://esm.sh/stable/react@19.2.5/jsx-runtime
         https://esm.sh/stable/react-dom@19.2.5/client
         https://esm.sh/stable/react-router@7.14.1(2026-04-13) react-router@7.14.2(2026-04-21) => Uncaught TypeError: can't access property "useRef", i.H is null
    -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/stable/react@19.2.5",
          "react/jsx-runtime": "https://esm.sh/stable/react@19.2.5/jsx-runtime",
          "react-dom/client": "https://esm.sh/stable/react-dom@19.2.5/client",
          "react-router": "https://esm.sh/stable/react-router@7.14.1"
        }
      }
    </script>
    <script type="module" src="https://esm.sh/tsx"></script>
  </head>
  <body>
    <h1 id="top">DWARF mini で天体撮影</h1>
    <div id="root"></div>
    <script type="text/babel">
      import { useState, useEffect, useRef } from "react";
      import { createRoot } from "react-dom/client";
      import { BrowserRouter, Routes, Route, Link, Navigate, useParams, useNavigate, useLocation } from "react-router";
      createRoot(document.getElementById("root")).render(<App/>);

      function App() {
        return (
          <BrowserRouter>
            <Routes>
              <Route index element={<Navigate to="/messier/" />} />
              <Route path="/messier/*" element={<GetData data_path="/messier/messier.json" />} />
              <Route path="/ngc/*"     element={<GetData data_path="/ngc/ngc.json" />} />
            </Routes>
          </BrowserRouter>
        );
      }

      function GetData(props) {
        const [ data, setData ] = useState();
        //console.log('MessierTopPage', data);
        useEffect(() => {
          //console.log('App useEffect');
          fetch(props.data_path+'?'+(new Date()).toISOString().substring(0,13), {method: 'GET'})
          .then(res => res.json())
          .then(data => {
            //console.log('App useEffect data', data);
            setData(data)
          })
        }, [props.data_path]);
        if (!data) {
          //console.log('App waiting messier.json');
          return;
        }
        return (
            <Routes>
              <Route path="/" element={<TopPage data={data} />} />
              <Route path="/images/:id" element={<Image data={data} />} />
            </Routes>
        );
      }

      function TopPage(props) {
        //console.log('TopPage props', props);
        const location = useLocation();
        const navigate = useNavigate();
        //console.log('TopPage location', location);
        const links = 
          props.data.list.map(function(m) {
            //console.log(m.I);
            if (m.I || m.N) {
              if (!m.N || m.M == m.N) {
                return (<span className={"link-list-"+props.data.catalog} key={m.M}><Link to={'#'+m.M}>{m.M}</Link></span>);
              }
              else {
                return (<span className={"link-list-"+props.data.catalog} key={m.M}><Link to={'#'+m.N}>{m.M}</Link></span>);
              }
            }
            else {
              return (<span className={"link-list-"+props.data.catalog} key={m.M}>{m.M}</span>);
            }
          });
        const match = location.hash.match(/^#((M|NGC)(\d+))$/);
        //console.log('TopPage location', location.pathname, location.hash, match);
        const thumbnails = 
          props.data.list.map(function(m) {
            //console.log(m.I);
            if (m.I) {
              if (!m.N || m.M == m.N) {
                //console.log('thumbnails map', m);
                return (
                  <div key={m.M} id={m.M} className={"thumbnail-box " + (match && m.M == match[1] ? "selected" : "")} >
                    <Link to={'/' + props.data.catalog + '/images/'+m.M} >
                      <img className="thumbnail-img" src={'/' + props.data.catalog + '/thumbnails/'+m.M+'.webp'} title={m.M} alt={m.M} loading="lazy" />
                    </Link>
                    <div style={{"text-align": "center", "height": "100px"}} ><ImageCaption m={m} /></div>
                  </div>
                );
              }
            }
          });
        //console.log(images);
        
         useEffect(() => {
          //console.log('useEffect location.hash', location.hash);
          if (location.hash) {
            const element = document.querySelector(location.hash)
            if (element) {
              element.scrollIntoView({behavior: "smooth", block: "center"} );
            }
          }
        }, [location.hash])

        useEffect(() => {
          //console.log('TopPage useEffect props.data.catalog', props.data.catalog);
          const handleKeyDown = (event) => {
            //console.log('handleKeyDown document.baseURI', document.baseURI);
            //console.log('TopPage useEffect match 1', match);
            const match = document.baseURI.match(/^.*\/#((M|NGC)(\d+))$/);
            //console.log('Key pressed:', '<' + event.key + '>', match ? match[3] : 'not match');
            const m = match ? (props.data.catalog == 'ngc' ? props.data.list.find((m) => m.M == match[1]) : props.data.list[match[3]-1]) : props.data.list[0]
            switch (event.key) {
              case 'Escape':
                document.getElementById('top').scrollIntoView();
                navigate('/' + props.data.catalog + '/');
                break;
              case 'ArrowUp':
                document.getElementById('top').scrollIntoView();
                break;
              case 'ArrowDown':
                document.getElementById('bottom').scrollIntoView();
                break;
              case 'ArrowLeft':
                navigate('#' + (match ? props.data.list[m.prev].M : m.M))
                break;
              case 'ArrowRight':
                navigate('#' + (match ? props.data.list[m.next].M : m.M))
                break;
              case 'Enter':
                event.preventDefault();
                if (match) {
                  //console.log('handleKeyDown Enter', 'navigate /messier/images/M' + match[1]);
                  navigate('/' + props.data.catalog + '/images/' + match[1]);
                }
                break;
            }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => {
            window.removeEventListener('keydown', handleKeyDown);
          };
        }, [props.data.catalog]);

        return (
          <>
            <header>
              {props.data.catalog == 'messier' ? 
                <>
                  <div>DWARF mini で撮影したメシエ天体一覧</div>
                  <div>東京都内の明るい空（ボートル・スケール 9）でも</div>
                  <div>全 {props.data.count} 天体（{props.data.image_count} 画像）を撮影できました</div>
                  <div><Link to="/ngc/">メシエ天体以外の撮影画像はこちら</Link></div>
                </>
                :
                <>
                  <div>DWARF mini で撮影したメシエ天体以外の一覧</div>
                  <div>東京都内の明るい空（ボートル・スケール 9）で挑戦中</div>
                  <div><Link to="/messier/">メシエ天体の撮影画像はこちら</Link></div>
                </>}
            </header>
            <div className="link-list">
              {links}
            </div>
            <div className="thumbnail-list">
              {thumbnails}
            </div>
            <div className="link-list">
              {links}
            </div>
            <footer id="bottom" >
              <div>※ サムネイルの画像は DWARF mini で撮影した画像を縮小し、横幅だけ詰めたもの</div>
              <div>※ 各画像をクリックすると、元画像が参照できます</div>
              <div>※ 元画像は DWARF mini の天文スタジオで自動補正を適用したもの</div>
              <div>※ １行目の表示は、撮影日時、シャッター速度、ゲイン、露出時間(シャッター速度xスタック数)、フィルター</div>
              {props.data.catalog == 'messier' ? 
                <div>※ 天体に関する情報は主に Wikipedia <a href="https://ja.wikipedia.org/wiki/%E3%83%A1%E3%82%B7%E3%82%A8%E5%A4%A9%E4%BD%93%E3%81%AE%E4%B8%80%E8%A6%A7">メシエ天体の一覧</a> より取得</div>
               :<div>※ 天体に関する情報は主に Wikipedia <a href="https://ja.wikipedia.org/wiki/%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B8%E3%82%A7%E3%83%8D%E3%83%A9%E3%83%AB%E3%82%AB%E3%82%BF%E3%83%AD%E3%82%B0%E5%A4%A9%E4%BD%93%E3%81%AE%E4%B8%80%E8%A6%A7">ニュージェネラルカタログ天体の一覧</a> より取得</div>}
              <div>※ 画像へのアノテーションは <a href="https://github.com/nordcomputer/astro-annotator">Astro Annotator</a> を使用</div>
              <div>※ 一部 Astro Annotator ではアノテーションできなかった画像については Siril でアノテーションしたものを使用</div>
            </footer>
          </>
        );
      }

      function Image(props) {
        //console.log('Image props', props);
        const navigate = useNavigate();
        const { id } = useParams();
        const [annotation, setAnnotation ] = useState(false);
        const homeRef = useRef();
        const prevRef = useRef();
        const nextRef = useRef();
        const annoRef = useRef();
        const match = id.match(/^(M|NGC)(\d+)$/);
        //console.log('Image match', match);
        if (!match) {
          return;
        }
        const m = props.data.catalog == 'ngc' ? props.data.list.find((m) => m.M == match[0]) : props.data.list[match[2]-1];
        //console.log('Image config', m);

        useEffect(() => {
          const handleKeyDown = (event) => {
            //console.log('Key pressed:', '<' + event.key + '>');
            switch (event.key) {
              case 'Escape':
                navigate('/' + props.data.catalog + '/');
                break;
              case 'ArrowUp':
                homeRef.current.click();
                break;
              case 'ArrowLeft':
                prevRef.current.click();
                break;
              case 'ArrowRight':
                nextRef.current.click();
                break;
              case ' ':
                event.preventDefault();
                annoRef.current.click();
                break;
            }
          };
          window.addEventListener('keydown', handleKeyDown);
          return () => {
            window.removeEventListener('keydown', handleKeyDown);
          };
        }, []);

        function toggle_annotation() {
          setAnnotation(annotation => !annotation);
        }

        return (
          <div>
            <div style={{"display": "flex", "justify-content": "space-evenly", "align-items": "center"}} >
              <div style={{width: "30%"}}></div>
              <Link ref={homeRef} to={'/'+props.data.catalog+'/#' + m.M}><img src="/common/btn-home.png" alt="Home" /></Link>
              <div style={{width: "30%"}}><button ref={annoRef} style={{padding: "5px 15px"}} onClick={toggle_annotation}>Annotation {annotation ? "Off" : "On"}</button></div>
            </div>
            <div style={{"display": "flex", "justify-content": "center"}} >
              <Link ref={prevRef} style={{"display": "flex", "align-items": "center"}} to={'/'+props.data.catalog+'/images/' + props.data.list[m.prev].M} ><img src="/common/btn-prev.png" alt="Prev" /></Link>
              <img style={{"max-width": "90%", "height": "auto", "margin": "10px 5px"}} src={'/'+props.data.catalog+'/images/' + (annotation ? m.I.substring(0, m.I.length-6) + 'A.webp' : m.I)} title={m.M} alt={m.M} onClick={toggle_annotation} />
              <Link ref={nextRef} style={{"display": "flex", "align-items": "center"}} to={'/'+props.data.catalog+'/images/' + props.data.list[m.next].M} ><img src="/common/btn-next.png" alt="Next" /></Link>
            </div>
            <div style={{"text-align": "center"}} ><ImageCaption m={m} /></div>
          </div>
        );
      }

      function ImageCaption(props) {
        //console.log('ImageCaption props', props);
        const m = props.m;
        return (
          <>
            <div style={{"font-size":"90%"}}>{m.D} {m.T} {m.S}s G{m.G} {m.E} {m.F}</div>
            {m.C1.map(function(c) {
              return (<div>{c}</div>);
            })}
            {m.C2 && <div>{m.C2}</div>}
          </>
        )
      }
    </script>
  </body>
</html>
